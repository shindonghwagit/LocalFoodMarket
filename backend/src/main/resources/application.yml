spring:
  profiles:
    active: local

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/auth/oauth2/callback/kakao"
            scope: profile_nickname, account_email
          google:
            redirect-uri: "{baseUrl}/auth/oauth2/callback/google"
            scope: profile, email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  servlet:
    context-path: /api/v1

jwt:
  access-expiration: 3600000
  refresh-expiration: 604800000

app:
  frontend-url: http://localhost:5173
  origin:
    user: ${APP_ORIGIN_USER:http://localhost:5173}
    admin: ${APP_ORIGIN_ADMIN:http://localhost:5174}

file:
  upload-dir: uploads/
  max-size: 10485760

order:
  # 배송완료(DELIVERED) 후 자동 수령확인까지의 기간(일). 테스트 시 줄여서 검증 가능.
  auto-confirm-days: 7

kakao:
  address:
    api-key: ${KAKAO_ADDRESS_API_KEY}
    url: https://dapi.kakao.com/v2/local/search/address.json

toss:
  client-key: ${TOSS_CLIENT_KEY:test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm}
  secret-key: ${TOSS_SECRET_KEY:test_gsk_docs_OaPz8L5KdmQXkzRz3y47BMw6}
  confirm-url: https://api.tosspayments.com/v1/payments/confirm