spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  secret: ${JWT_SECRET}

app:
  frontend-url: ${APP_ORIGIN_USER:http://localhost}
  origin:
    user: ${APP_ORIGIN_USER:http://localhost}
    admin: ${APP_ORIGIN_ADMIN:http://admin.localhost}
