services:
  db:
    image: postgres:16
    container_name: localfoodmarket-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [appnet]

  backend:
    build:
      context: ./backend
    container_name: localfood-backend
    depends_on: [db]
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      KAKAO_ADDRESS_API_KEY: ${KAKAO_ADDRESS_API_KEY:-}
      APP_ORIGIN_USER: ${APP_ORIGIN_USER:-http://localhost}
      APP_ORIGIN_ADMIN: ${APP_ORIGIN_ADMIN:-http://admin.localhost}
    networks: [appnet]

  frontend-user:
    build:
      context: ./frontend
      args:
        APP_MODE: user
    container_name: localfood-frontend-user
    expose:
      - "80"
    volumes:
      - ./nginx/spa.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [appnet]

  frontend-admin:
    build:
      context: ./frontend
      args:
        APP_MODE: admin
    container_name: localfood-frontend-admin
    expose:
      - "80"
    volumes:
      - ./nginx/spa.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [appnet]

  proxy:
    image: nginx:1.27-alpine
    container_name: localfood-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend-user
      - frontend-admin
    networks: [appnet]

volumes:
  postgres_data:

networks:
  appnet:
    driver: bridge
