# ── 일반 사용자 도메인 ─────────────────────────────────────────────
server {
    listen 80;
    server_name localhost example.com www.example.com;

    # API → 백엔드
    location /api/ {
        # /api/v1/admin/** 은 사용자 도메인에서 호출 금지
        location /api/v1/admin/ {
            return 404;
        }
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Origin user;
        # SSE 대응
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # 정적 SPA → 사용자 빌드
    location / {
        proxy_pass http://frontend-user:80;
        proxy_set_header Host $host;
    }
}

# ── 관리자 도메인 ──────────────────────────────────────────────────
server {
    listen 80;
    server_name admin.localhost admin.example.com;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Origin admin;
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    location / {
        proxy_pass http://frontend-admin:80;
        proxy_set_header Host $host;
    }
}
